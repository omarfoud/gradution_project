services:
  ai-job-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-job-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      HF_REPO_ID: ${HF_REPO_ID:-omaralifouda/jobify-artifacts}
      HF_REPO_TYPE: ${HF_REPO_TYPE:-dataset}
      HF_DB_FILENAME: ${HF_DB_FILENAME:-jobs.db}
      HF_INDEX_FILENAME: ${HF_INDEX_FILENAME:-jobs.index}
      HF_ARTIFACT_DIR: /app/artifacts
      DB_PATH: /app/artifacts/jobs.db
      INDEX_PATH: /app/artifacts/jobs.index
      MODEL_NAME: all-MiniLM-L6-v2
      DEVICE: cpu
      SQL_PORT: 1433
      SQL_DRIVER: ODBC Driver 18 for SQL Server
    volumes:
      - hf-artifacts:/app/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  hf-artifacts:
